name: WebGL Build

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, main]
    paths:
      - '.github/workflows/webgl-build.yml'
      - 'UNITY/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/webgl-build.yml'
      - 'UNITY/**'

env:
  # Forward-compatibility flag used by the existing workflows in this repo.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-webgl:
    name: Build Unity WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 60

    concurrency:
      group: webgl-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: UNITY/Library
          key: unity-library-webgl-${{ runner.os }}-${{ hashFiles('UNITY/ProjectSettings/ProjectVersion.txt', 'UNITY/ProjectSettings/ProjectSettings.asset', 'UNITY/Packages/packages-lock.json') }}
          restore-keys: |
            unity-library-webgl-${{ runner.os }}-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: UNITY
          unityVersion: 2020.3.49f1
          targetPlatform: WebGL
          buildsPath: build
          buildName: WarOfTanks

      - name: Verify WebGL artifact shape
        run: |
          echo "Generated build files:"
          find build -maxdepth 4 -type f | sort
          test -n "$(find build -maxdepth 4 -name index.html -print -quit)"
          test -n "$(find build -maxdepth 4 -name '*.wasm' -print -quit)"
          test -n "$(find build -maxdepth 4 -name '*.loader.js' -print -quit)"

      - name: Upload WebGL build
        uses: actions/upload-artifact@v4
        with:
          name: waroftanks-webgl-build
          path: build
          if-no-files-found: error
          retention-days: 14

      - name: Package WebGL release asset
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          BUILD_INDEX="$(find build -maxdepth 4 -name index.html -print -quit)"
          BUILD_DIR="$(dirname "$BUILD_INDEX")"
          tar -C "$BUILD_DIR" -czf waroftanks-webgl-build.tar.gz .

      - name: Publish WebGL GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="webgl-${GITHUB_SHA}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" waroftanks-webgl-build.tar.gz --clobber
            gh release edit "$TAG" --latest
          else
            gh release create "$TAG" waroftanks-webgl-build.tar.gz \
              --target "$GITHUB_SHA" \
              --title "WebGL build ${GITHUB_SHA::7}" \
              --notes "Automated Unity WebGL build from main at commit $GITHUB_SHA." \
              --latest
          fi

      - name: Trigger Vercel deployment
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::notice::VERCEL_DEPLOY_HOOK_URL is not configured; skipping Vercel deployment."
            exit 0
          fi
          curl --fail --silent --show-error --request POST "$VERCEL_DEPLOY_HOOK_URL"
